<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassIntel - Password Intelligence Tool</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #161b22;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 450px;
            border: 1px solid #30363d;
        }
        h1 {
            text-align: center;
            color: #58a6ff;
            margin-bottom: 25px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background-color: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2ea043; }
        .result-box {
            margin-top: 25px;
            display: none;
            background-color: #21262d;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #30363d;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .value { font-weight: bold; color: #ffffff; }
        #status-banner {
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
            padding: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🔒 PassIntel</h1>
    <p style="text-align: center; font-size: 14px; color: #8b949e;">Advanced Password Security Intelligence Tool</p>
    
    <input type="text" id="passwordInput" placeholder="Enter password to analyze...">
    <button onclick="analyzePassword()">Analyze Intelligence</button>

    <div class="result-box" id="resultBox">
        <div id="status-banner"></div>
        <div class="metric">
            <span>Data Breach Leaks:</span>
            <span class="value" id="leakCount" style="color: #ff4a4a;"></span>
        </div>
        <div class="metric">
            <span>Entropy Strength:</span>
            <span class="value" id="entropy"></span>
        </div>
        <div class="metric">
            <span>Brute-force Crack Time:</span>
            <span class="value" id="crackTime" style="color: #58a6ff;"></span>
        </div>
    </div>
</div>

<script>
    async function analyzePassword() {
        const password = document.getElementById('passwordInput').value;
        if (!password) return;

        const response = await fetch('/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: password })
        });

        const data = await response.json();
        
        // Show and update results
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('resultBox').style.borderLeftColor = data.color;
        
        const banner = document.getElementById('status-banner');
        banner.innerText = `STATUS: ${data.status}`;
        banner.style.backgroundColor = data.color + "22"; // 22 adds transparency
        banner.style.color = data.color;

        document.getElementById('leakCount').innerText = `${data.leak_count} times`;
        document.getElementById('entropy').innerText = `${data.entropy} bits`;
        document.getElementById('crackTime').innerText = data.crack_time;
    }
</script>

</body>
</html>
